name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build CLI
        run: go build -o canvas .
